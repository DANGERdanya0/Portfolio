<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>IT-педагог | Персональный сайт преподавателя</title>
</head>
<body>

    <div class="main-layout">
        <aside id="sidebar">
            <!-- Sidebar content will be loaded dynamically -->
        </aside>

        <main id="content">
            <!-- Hero section -->
            <div class="hero" data-content-key="hero">
                <!-- Hero content will be loaded dynamically -->
            </div>

            <!-- Page sections -->
            <section id="home" class="page" data-content-key="home">
                <!-- Home content will be loaded dynamically -->
            </section>

            <section id="business-card" class="page" data-content-key="business-card">
                <!-- Business card content will be loaded dynamically -->
            </section>

            <section id="methodical" class="page" data-content-key="methodical">
                <!-- Methodical content will be loaded dynamically -->
            </section>

            <section id="results" class="page" data-content-key="results">
                <!-- Results content will be loaded dynamically -->
            </section>

            <section id="blog" class="page" data-content-key="blog">
                <!-- Blog content will be loaded dynamically -->
            </section>

            <section id="extracurricular" class="page" data-content-key="extracurricular">
                <!-- Extracurricular content will be loaded dynamically -->
            </section>

            <section id="students" class="page" data-content-key="students">
                <!-- Students content will be loaded dynamically -->
            </section>

            <section id="gallery" class="page" data-content-key="gallery">
                <!-- Gallery content will be loaded dynamically -->
            </section>

            <section id="guestbook" class="page" data-content-key="guestbook">
                <!-- Guestbook content will be loaded dynamically -->
            </section>
        </main>
    </div>

    <div id="admin-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Админ-Панель</h2>
                <button id="close-admin-panel" class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Admin panel content will be generated dynamically -->
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
    <script src="admin.js" defer></script>
</body>
</html>
